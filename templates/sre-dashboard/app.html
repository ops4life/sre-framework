<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRE Ops — Mission Control</title>
  <style>
    /* Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

    /* ── Color Tokens ── */
    :root {
      --accent:          #caff04;
      --accent-hover:    #b6e602;
      --accent-tint:     rgba(202, 255, 4, 0.16);
      --accent-glow:     rgba(202, 255, 4, 0.25);
      --bg:              #ffffff;
      --surface:         #f4f6f5;
      --surface-2:       #eef1ef;
      --surface-3:       #e3e7e4;
      --text:            #0b0d0c;
      --text-2:          rgba(11, 13, 12, 0.88);
      --muted:           rgba(11, 13, 12, 0.55);
      --border:          rgba(11, 13, 12, 0.06);
      --shadow:          0 10px 30px rgba(11, 13, 12, 0.03);
      --shadow-hover:    0 16px 48px rgba(11, 13, 12, 0.05);
      --green:           #22c55e;
      --green-glow:      rgba(34, 197, 94, 0.25);
      --amber:           #facc15;
      --amber-glow:      rgba(250, 204, 21, 0.25);
      --danger:          #ef4444;
      --danger-glow:     rgba(239, 68, 68, 0.25);
      --danger-tint:     rgba(239, 68, 68, 0.10);
      --blue:            #3b82f6;
      --blue-glow:       rgba(59, 130, 246, 0.25);
      --selection-bg:    var(--accent);
      --selection-text:  #0b0d0c;
      /* Typography */
      --font-sans:     'Outfit', 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-display:  'Outfit', 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono:     'JetBrains Mono', ui-monospace, Menlo, monospace;
      /* Spacing */
      --radius:       24px;
      --radius-md:    16px;
      --radius-sm:    10px;
      --radius-xs:     6px;
      --radius-pill: 999px;
      --page-max-width: 1320px;
      --grid-size:    36px;
      --grid-color:   var(--border);
    }

    :root[data-theme="dark"] {
      --bg:              #0b0c0c;
      --surface:         #101213;
      --surface-2:       #191c1e;
      --surface-3:       #222629;
      --text:            #f3f5f6;
      --text-2:          rgba(243, 245, 246, 0.88);
      --muted:           rgba(243, 245, 246, 0.60);
      --border:          rgba(243, 245, 246, 0.08);
      --shadow:          0 12px 40px rgba(0, 0, 0, 0.45);
      --shadow-hover:    0 16px 48px rgba(0, 0, 0, 0.55);
      --accent-tint:     rgba(202, 255, 4, 0.08);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--selection-bg); color: var(--selection-text); }

    /* ── Animation ── */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="./data.js"></script>
  <script type="text/babel" src="./Dashboard.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SreDashboard));
  </script>
</body>
</html>
