<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <style>
    .icon-bg {
      fill: #ffffff;
    }
    .icon-border {
      stroke: #caff04;
      stroke-width: 8;
    }
    .icon-symbol {
      stroke: #caff04;
      stroke-width: 12;
      stroke-linecap: round;
    }
    @media (prefers-color-scheme: dark) {
      .icon-bg {
        fill: #000000;
      }
    }
  </style>
  <!-- Rounded border with background fill -->
  <rect x="8" y="8" width="112" height="112" rx="30" class="icon-bg icon-border" />
  <!-- Asterisk Symbol -->
  <g class="icon-symbol">
    <line x1="64" y1="26" x2="64" y2="102" />
    <line x1="31" y1="45" x2="97" y2="83" />
    <line x1="31" y1="83" x2="97" y2="45" />
  </g>
</svg>
