# Demo SRE config — uses the generic http provider preset with synthetic data.
# Works out-of-the-box with the bundled metrics-generator.
provider: http
default_service: api

queries:
  saturation: 'demo_saturation_percent{{service="{service}"}}'
  cap_vps_cpu: 'demo_vps_cpu_percent'
  cap_vps_mem: 'demo_vps_memory_percent'
  cap_vps_disk: 'demo_vps_disk_percent'
  cap_container_cpu: 'demo_container_cpu_percent{{service="{service}"}}'
  cap_container_mem: 'demo_container_memory_percent{{service="{service}"}}'

services:
  - name: frontend
    slo_target: 99.9
    labels:
      service: frontend

  - name: api
    slo_target: 99.5
    labels:
      service: api

  - name: worker
    slo_target: 99.0
    labels:
      service: worker
